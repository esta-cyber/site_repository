<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    {% load static %}
    <link rel="stylesheet" href="{% static 'style/css/chat.css' %}">
    <title>Ustoz bilan suhbat</title>
</head>
<body>
    <header class="top-bar">
        <button class="menu-btn" id="menuBtn" aria-label="Menyu ochish">
            <span></span>
            <span></span>
            <span></span>
        </button>
        <div class="panel-title">Ustoz bilan suhbat</div>
        <div style="display:flex;align-items:center;gap:10px;">
            <div style="width:36px;height:36px;border-radius:50%;background:#cfe3ff;color:#2b6cb0;display:flex;align-items:center;justify-content:center;font-weight:700;">{{ user.surname|slice:":1" }}</div>
            <div>{{ user.surname }}</div>
        </div>
    </header>

    <nav class="menu-overlay" id="menuOverlay">
        {% include 'menu.html' %}
    </nav>

    <main class="content chat">
        <p>Hozircha suhbat uchun namuna sahifa. Keyingi bosqichda real chat xidmatini qo'shish mumkin.</p>
    </main>

    <script>
        const menuBtn = document.getElementById('menuBtn');
        const menuOverlay = document.getElementById('menuOverlay');
        const mainContent = document.querySelector('main');
        const menuClose = document.querySelector('.menu-close');
        const menuLinks = document.querySelectorAll('.menu-drawer a');

        const toggleMenu = () => {
            menuOverlay.classList.toggle('open');
            mainContent.classList.toggle('dimmed');
        };

        menuBtn.addEventListener('click', toggleMenu);
        if (menuClose) menuClose.addEventListener('click', toggleMenu);
        menuLinks.forEach(link => link.addEventListener('click', () => {
            menuOverlay.classList.remove('open');
            mainContent.classList.remove('dimmed');
        }));
        menuOverlay.addEventListener('click', event => {
            if (event.target === menuOverlay) toggleMenu();
        });
    </script>
</body>
</html>
